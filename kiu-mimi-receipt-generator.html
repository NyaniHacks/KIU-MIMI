<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIU-MIMI Receipt Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f5ede0;
    --warm: #c9a87c;
    --dark: #5c3d2e;
    --mid: #8b6347;
    --light: #fdf7f0;
    --border: #ddd0c0;
    --text: #3a2a1e;
    --muted: #9a7b65;
    --accent: #d4956a;
  }
  body { font-family: 'Georgia', serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  
  /* ── LAYOUT ── */
  .app { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; }
  
  /* ── LEFT PANEL ── */
  .panel-left {
    background: var(--light);
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    overflow-y: auto;
    max-height: 100vh;
    position: sticky;
    top: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .brand img { width: 52px; height: 52px; object-fit: cover; border-radius: 50%; border: 2px solid var(--warm); }
  .brand-name { font-size: 18px; font-weight: bold; color: var(--dark); letter-spacing: .02em; }
  .brand-tagline { font-size: 11px; color: var(--muted); }
  
  .section { margin-bottom: 1.25rem; }
  .section-title {
    font-size: 10px; font-weight: bold; letter-spacing: .1em; text-transform: uppercase;
    color: var(--warm); margin-bottom: .6rem; font-family: 'Arial', sans-serif;
  }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .field { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  label { font-size: 11px; color: var(--muted); font-family: 'Arial', sans-serif; }
  input, textarea, select {
    font-size: 12px; padding: 6px 9px;
    border: 1px solid var(--border); border-radius: 6px;
    background: white; color: var(--text);
    width: 100%; font-family: 'Arial', sans-serif;
    transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--warm);
  }
  textarea { resize: vertical; min-height: 52px; }
  
  /* Items */
  .item-header { display: grid; grid-template-columns: 2fr 52px 80px 24px; gap: 6px; margin-bottom: 4px; }
  .item-header span { font-size: 10px; color: var(--muted); font-family: Arial, sans-serif; }
  .item-row { display: grid; grid-template-columns: 2fr 52px 80px 24px; gap: 6px; align-items: center; margin-bottom: 5px; }
  .item-row input { font-size: 11px; padding: 5px 7px; }
  .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px; line-height: 1; padding: 0; }
  .remove-btn:hover { color: #c0392b; }
  .add-btn {
    width: 100%; padding: 7px; margin-top: 4px;
    border: 1px dashed var(--border); border-radius: 6px;
    background: none; cursor: pointer; font-size: 12px;
    color: var(--muted); font-family: Arial, sans-serif;
    transition: all .2s;
  }
  .add-btn:hover { border-color: var(--warm); color: var(--warm); }
  
  /* Buttons */
  .action-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
  .btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: Arial, sans-serif; font-weight: 600; letter-spacing: .03em; transition: all .2s; }
  .btn-pdf { background: var(--dark); color: white; border: none; }
  .btn-pdf:hover { background: var(--mid); }
  .btn-print { background: none; border: 1.5px solid var(--warm); color: var(--dark); }
  .btn-print:hover { background: var(--cream); }
  .btn-html { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; }
  .btn-html:hover { border-color: var(--warm); color: var(--dark); }

  /* ── RIGHT PANEL ── */
  .panel-right {
    background: #e8ddd0;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .preview-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 1rem; font-family: Arial, sans-serif;
  }
  
  /* ── RECEIPT ── */
  #receiptPreview {
    background: white;
    width: 480px;
    max-width: 100%;
    padding: 2rem;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(92,61,46,.15);
    font-family: 'Georgia', serif;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
  }
  .r-header { text-align: center; padding-bottom: 1.2rem; margin-bottom: 1.2rem; border-bottom: 1px dashed var(--border); }
  .r-logo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin: 0 auto 8px; display: block; border: 3px solid var(--warm); }
  .r-biz-name { font-size: 20px; font-weight: bold; color: var(--dark); margin-bottom: 3px; }
  .r-biz-sub { font-size: 11px; color: var(--muted); font-family: Arial, sans-serif; }
  
  .r-meta { display: flex; justify-content: space-between; margin-bottom: 1.2rem; font-size: 11px; font-family: Arial, sans-serif; }
  .r-meta-col { display: flex; flex-direction: column; gap: 2px; }
  .meta-lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
  .meta-val { color: var(--dark); font-weight: 600; }
  
  .r-items-head {
    display: grid; grid-template-columns: 2fr 1fr 1fr;
    font-size: 10px; font-family: Arial, sans-serif; font-weight: bold;
    text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
    padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 6px;
  }
  .r-item {
    display: grid; grid-template-columns: 2fr 1fr 1fr;
    padding: 5px 0; border-bottom: 1px solid #f0e8de;
    font-size: 12px; font-family: Arial, sans-serif;
  }
  .r-item span:nth-child(2) { text-align: center; }
  .r-item span:nth-child(3) { text-align: right; }
  .r-items-head span:nth-child(2) { text-align: center; }
  .r-items-head span:nth-child(3) { text-align: right; }
  
  .r-totals { margin-top: 10px; }
  .r-total-row {
    display: flex; justify-content: space-between;
    font-size: 12px; font-family: Arial, sans-serif; padding: 3px 0;
  }
  .r-total-row.grand {
    font-size: 15px; font-weight: bold; color: var(--dark);
    border-top: 2px solid var(--warm); margin-top: 6px; padding-top: 8px;
  }
  .r-footer {
    text-align: center; margin-top: 1.2rem; padding-top: 1rem;
    border-top: 1px dashed var(--border);
    font-size: 11px; color: var(--muted); font-family: Arial, sans-serif;
  }
  .r-paid-stamp {
    display: inline-block; border: 3px solid #27ae60; color: #27ae60;
    font-size: 22px; font-weight: bold; letter-spacing: .15em;
    padding: 4px 16px; border-radius: 4px; transform: rotate(-8deg);
    margin: .8rem 0; opacity: .85; font-family: Arial, sans-serif;
  }
  .paid-wrap { text-align: center; }

  /* ── PRINT ── */
  @media print {
    .panel-left, .preview-label { display: none !important; }
    .app { grid-template-columns: 1fr; }
    .panel-right { background: white; padding: 0; min-height: unset; }
    #receiptPreview { box-shadow: none; margin: 0 auto; }
  }
</style>
</head>

        <div class="brand-name">KIU-MIMI</div>

    <div class="section">
      <div class="section-title">Business info</div>
      <div class="row"><div class="field"><label>Business name</label><input id="bizName" value="KIU-MIMI"></div></div>
      <div class="row">
        <div class="field"><label>Email</label><input id="bizEmail" placeholder="hello@kiu-mimi.com"></div>
        <div class="field"><label>Phone</label><input id="bizPhone" placeholder="+254 700 000 000"></div>
      </div>
      <div class="row"><div class="field"><label>Address</label><textarea id="bizAddress" rows="2" placeholder="Nairobi, Kenya"></textarea></div></div>
    </div>

    <div class="section">
      <div class="section-title">Receipt details</div>
      <div class="row">
        <div class="field"><label>Receipt #</label><input id="receiptNum" value="REC-001"></div>
        <div class="field"><label>Date</label><input id="receiptDate" type="date"></div>
      </div>
      <div class="row">
        <div class="field"><label>Customer name</label><input id="custName" placeholder="Customer name"></div>
        <div class="field"><label>Customer phone</label><input id="custPhone" placeholder="+254 ..."></div>
      </div>
      <div class="row">
        <div class="field"><label>Payment method</label>
          <select id="payMethod">
            <option>M-Pesa</option><option>Cash</option><option>Bank Transfer</option><option>Card</option><option>Cheque</option>
          </select>
        </div>
        <div class="field"><label>Currency</label>
          <select id="currency">
            <option value="KES">KES</option><option value="USD">USD</option><option value="GBP">GBP</option><option value="EUR">EUR</option>
          </select>
        </div>
      </div>
      <div class="row"><div class="field"><label>M-Pesa / Ref code (optional)</label><input id="mpesaRef" placeholder="e.g. QGH7X2ABC1"></div></div>
      <div class="row"><div class="field" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="showPaid" style="width:auto">
        <label for="showPaid" style="font-size:12px;color:var(--text)">Mark as PAID</label>
      </div></div>
    </div>

    <div class="section">
      <div class="section-title">Items</div>
      <div class="item-header">
        <span>Description</span><span style="text-align:center">Qty</span><span>Price</span><span></span>
      </div>
      <div id="itemsContainer"></div>
      <button class="add-btn" onclick="addItem()">+ Add item</button>
    </div>

    <div class="section">
      <div class="section-title">Charges &amp; discount</div>
      <div class="row">
        <div class="field"><label>Tax (%)</label><input id="taxRate" type="number" value="0" min="0" max="100" step="0.1"></div>
        <div class="field"><label>Discount (%)</label><input id="discRate" type="number" value="0" min="0" max="100" step="0.1"></div>
        <div class="field"><label>Shipping/Delivery</label><input id="shipping" type="number" value="0" min="0"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Footer note</div>
      <textarea id="footerNote" rows="2">Thank you for shopping with KIU-MIMI! ♡</textarea>
    </div>

    <div class="action-btns">
      <button class="btn btn-pdf" onclick="downloadPDF()">⬇ Download as PDF</button>
      <button class="btn btn-print" onclick="window.print()">🖨 Print receipt</button>
      <button class="btn btn-html" onclick="downloadHTML()">Save as HTML file</button>
    </div>

let items = [{desc:'',qty:1,price:0},{desc:'',qty:1,price:0}];

function v(id){ return (document.getElementById(id)||{}).value||''; }

function fmt(n){
  const cur = document.getElementById('currency')?.value||'KES';
  return cur+' '+parseFloat(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function addItem(){ items.push({desc:'',qty:1,price:0}); renderItems(); updatePreview(); }

function removeItem(i){ if(items.length>1){ items.splice(i,1); renderItems(); updatePreview(); } }

function renderItems(){
  document.getElementById('itemsContainer').innerHTML = items.map((it,i)=>`
    <div class="item-row">
      <input value="${it.desc}" placeholder="Item name" onchange="items[${i}].desc=this.value;updatePreview()">
      <input type="number" value="${it.qty}" min="1" style="text-align:center" onchange="items[${i}].qty=parseFloat(this.value)||0;updatePreview()">
      <input type="number" value="${it.price}" min="0" step="0.01" onchange="items[${i}].price=parseFloat(this.value)||0;updatePreview()">
      <button class="remove-btn" onclick="removeItem(${i})">×</button>
    </div>`).join('');
}

function calcTotals(){
  const subtotal=items.reduce((s,it)=>s+(it.qty*it.price),0);
  const disc=parseFloat(v('discRate'))||0;
  const tax=parseFloat(v('taxRate'))||0;
  const ship=parseFloat(v('shipping'))||0;
  const discAmt=subtotal*(disc/100);
  const taxAmt=(subtotal-discAmt)*(tax/100);
  const total=subtotal-discAmt+taxAmt+ship;
  return{subtotal,discAmt,taxAmt,ship,total,disc,tax};
}

function updatePreview(){
  const t=calcTotals();
  const date=v('receiptDate');
  const fmtDate=date?new Date(date+' 00:00').toLocaleDateString('en-KE',{day:'numeric',month:'long',year:'numeric'}):'—';
  const paid=document.getElementById('showPaid')?.checked;
  const ref=v('mpesaRef');

  const itemRows=items.filter(it=>it.desc||it.price>0).map(it=>`
    <div class="r-item">
      <span>${it.desc||'—'}</span>
      <span>${it.qty}</span>
      <span>${fmt(it.qty*it.price)}</span>
    </div>`).join('');

  document.getElementById('receiptPreview').innerHTML=`
    <div class="r-header">
      <img src="${LOGO}" class="r-logo" alt="KIU-MIMI Logo">
      <div class="r-biz-name">${v('bizName')||'KIU-MIMI'}</div>
      ${v('bizAddress')?`<div class="r-biz-sub">${v('bizAddress').replace(/\n/g,', ')}</div>`:''}
      ${v('bizEmail')||v('bizPhone')?`<div class="r-biz-sub">${[v('bizEmail'),v('bizPhone')].filter(Boolean).join(' · ')}</div>`:''}
    </div>
    <div class="r-meta">
      <div class="r-meta-col">
        <span class="meta-lbl">Receipt #</span><span class="meta-val">${v('receiptNum')||'—'}</span>
        <span class="meta-lbl" style="margin-top:8px">Payment</span><span class="meta-val">${v('payMethod')||'—'}</span>
        ${ref?`<span class="meta-lbl" style="margin-top:4px">Ref</span><span class="meta-val">${ref}</span>`:''}
      </div>
      <div class="r-meta-col" style="text-align:right">
        <span class="meta-lbl">Date</span><span class="meta-val">${fmtDate}</span>
        ${v('custName')?`<span class="meta-lbl" style="margin-top:8px">Bill to</span><span class="meta-val">${v('custName')}</span>`:''}
        ${v('custPhone')?`<span style="color:var(--muted);font-size:11px">${v('custPhone')}</span>`:''}
      </div>
    </div>
    <div class="r-items-head"><span>Description</span><span>Qty</span><span>Amount</span></div>
    ${itemRows||'<div style="color:var(--muted);padding:8px 0;font-size:11px">No items added yet</div>'}
    <div class="r-totals">
      <div class="r-total-row"><span>Subtotal</span><span>${fmt(t.subtotal)}</span></div>
      ${t.disc>0?`<div class="r-total-row"><span>Discount (${t.disc}%)</span><span>− ${fmt(t.discAmt)}</span></div>`:''}
      ${t.tax>0?`<div class="r-total-row"><span>Tax (${t.tax}%)</span><span>${fmt(t.taxAmt)}</span></div>`:''}
      ${t.ship>0?`<div class="r-total-row"><span>Delivery</span><span>${fmt(t.ship)}</span></div>`:''}
      <div class="r-total-row grand"><span>TOTAL</span><span>${fmt(t.total)}</span></div>
    </div>
    ${paid?'<div class="paid-wrap"><div class="r-paid-stamp">PAID</div></div>':''}
    ${v('footerNote')?`<div class="r-footer">${v('footerNote')}</div>`:''}
  `;
}

async function downloadPDF(){
  const btn=document.querySelector('.btn-pdf');
  btn.textContent='Generating PDF…'; btn.disabled=true;
  try{
    const el=document.getElementById('receiptPreview');
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
    const imgData=canvas.toDataURL('image/png');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a5'});
    const pdfW=pdf.internal.pageSize.getWidth();
    const pdfH=(canvas.height*pdfW)/canvas.width;
    pdf.addImage(imgData,'PNG',0,0,pdfW,pdfH);
    pdf.save('receipt-'+(v('receiptNum')||'001')+'.pdf');
  }catch(e){alert('PDF error: '+e.message);}
  btn.textContent='⬇ Download as PDF'; btn.disabled=false;
}

function downloadHTML(){
  const content=document.documentElement.outerHTML;
  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(content);
  a.download='kiu-mimi-receipt-generator.html';
  a.click();
}

document.addEventListener('input', updatePreview);
document.addEventListener('change', updatePreview);
document.getElementById('receiptDate').value=new Date().toISOString().split('T')[0];
renderItems();
updatePreview();
</script>
